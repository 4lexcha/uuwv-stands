<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stands Finder</title>
</head>
<body>
  <h1>Stands Finder (UUWW)</h1>

  <input id="aircraft" placeholder="Введите ICAO тип (например B738)">
  <button onclick="find()">Найти</button>

  <p id="result"></p>
 
  <script>
	async function find() {
	  const type = document.getElementById('aircraft').value.toUpperCase();
	  const res = await fetch('stands.json');
	  const data = await res.json();

	  console.log(data);

	  const stands = data.UUWW[type];

	  if (!stands) {
		document.getElementById('result').innerText =
		  'Тип не найден: ' + type;
		return;
	  }

	  document.getElementById('result').innerText =
		stands.join(', ');
	}
	</script>
</body>
</html>
