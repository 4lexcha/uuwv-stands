<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stands Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }
    .section {
      margin: 20px 0;
    }
    label {
      display: block;
      margin: 10px 0 5px 0;
      font-weight: bold;
    }
    select {
      padding: 8px;
      font-size: 14px;
      min-width: 350px;
    }
    input[type="text"] {
      padding: 8px;
      font-size: 14px;
      min-width: 350px;
    }
    .radio-group {
      margin-top: 10px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      font-weight: normal;
      margin: 8px 0;
    }
    .radio-group input[type="radio"] {
      margin-right: 10px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .checkbox-group {
      margin-top: 10px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      font-weight: normal;
      margin: 5px 0;
    }
    .checkbox-group input[type="checkbox"] {
      margin-right: 10px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      margin-top: 10px;
      margin-right: 10px;
    }
    button:hover {
      background-color: #0056b3;
    }
    .notam-section {
      background-color: #fff3cd;
      padding: 15px;
      border-radius: 5px;
      margin-top: 20px;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background-color: #f0f0f0;
      border-radius: 5px;
      min-height: 40px;
    }
    .stand-item {
      display: inline-block;
      margin-right: 10px;
      padding: 5px 8px;
      border-radius: 3px;
    }
    .stand-active {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    .stand-closed {
      background-color: #ffebee;
      color: #c62828;
      text-decoration: line-through;
    }
  </style>
</head>
<body>
  <h1>Stands Finder</h1>
  
  <div class="section">
    <label for="airport">Аэропорт:</label>
    <select id="airport">
      <option value="">-- Выберите аэропорт --</option>
    </select>
  </div>

  <div class="section">
    <label for="terminal">Терминал:</label>
    <select id="terminal">
      <option value="">-- Выберите терминал --</option>
    </select>
  </div>

  <div class="section">
    <label>Тип операции:</label>
    <div class="radio-group">
      <label>
        <input type="radio" name="operationType" value="passenger" checked>
        Пассажирский рейс
      </label>
      <label>
        <input type="radio" name="operationType" value="cargo">
        Грузовой рейс
      </label>
    </div>
    <div class="checkbox-group">
      <label>
        <input type="checkbox" id="remoteQuickSelectCheck" value="remote_quick">
        Lowcost/Charter
      </label>
    </div>
  </div>

  <div id="passengerSection">
    <div class="section">
      <label for="location">Расположение:</label>
      <select id="location">
        <option value="">-- Не выбрано --</option>
        <option value="gate">Рукав терминала (Gate)</option>
        <option value="remote">Летное поле (Remote)</option>
      </select>
    </div>

    <div id="gateSection" class="disabled">
      <div class="section">
        <label for="gateFlightType">Тип рейса (Gate):</label>
        <select id="gateFlightType" disabled>
          <option value="">-- Не выбрано --</option>
          <option value="international">Международный</option>
          <option value="domestic">Внутренний</option>
        </select>
      </div>
    </div>
  </div>

  <div id="cargoSection" class="disabled">
  </div>

  <div class="section">
    <label for="aircraftType">Тип самолета:</label>
    <select id="aircraftType">
      <option value="">-- Не выбрано --</option>
    </select>
  </div>

  <button onclick="find()">Найти стойки</button>
  
  <div class="notam-section">
    <h3>Закрытые стоянки по NOTAM</h3>
    <div class="section">
      <label for="notamStands">Номера стоянок (через запятую):</label>
      <input type="text" id="notamStands" placeholder="Например: 1, 2, 3A, 4B">
    </div>
    <button onclick="loadNotamStands()">Загрузить NOTAM</button>
    <p id="notamStatus"></p>
  </div>

  <div id="result"></div>

      { code: "C560", name: "C560 (Cessna 560 Citation V / Ultra / Encore)" },
      { code: "C650", name: "C650 (Cessna 650 Citation III / VI / VII)" },
      { code: "C680", name: "C680 (Cessna 680 Citation Sovereign)" },
      { code: "C750", name: "C750 (Cessna 750 Citation X)" },
      { code: "AN24", name: "AN24 (Antonov An-24 / An-148)" },
      { code: "AN28", name: "AN28 (Antonov An-28)" },
      { code: "AN140", name: "AN140 (Antonov An-140)" },
      { code: "IL18", name: "IL18 (Ilyushin Il-18)" },
      { code: "IL86", name: "IL86 (Ilyushin Il-86)" },
      { code: "IL114", name: "IL114 (Ilyushin Il-114)" },
      { code: "T134", name: "T134 (Tupolev Tu-134)" },
      { code: "T154", name: "T154 (Tupolev Tu-154)" },
      { code: "YK42", name: "YK42 (Yakovlev Yak-42)" },
      { code: "MI8", name: "MI8 (Mil Mi-8 helicopter)" }

    // Загружаем данные при загрузке страницы
    fetch('stands.json')
      .then(response => response.json())
      .then(data => {
        standsData = data;
        
        // Заполняем выпадающий список аэропортов
        const airportSelect = document.getElementById('airport');
        Object.keys(standsData.airports).forEach(code => {
          const option = document.createElement('option');
          option.value = code;
          option.textContent = standsData.airports[code].name + ` (${code})`;
          airportSelect.appendChild(option);
        });
      })
      .catch(error => {
        console.error('Ошибка при загрузке данных:', error);
        document.getElementById('result').innerHTML = '<p style="color: red;">Ошибка при загрузке данных</p>';
      });

    // Обновляем терминалы при выборе аэропорта
    document.getElementById('airport').addEventListener('change', function() {
      const terminalSelect = document.getElementById('terminal');
      const operationRadios = document.querySelectorAll('input[name="operationType"]');
      const passengerRadio = document.querySelector('input[name="operationType"][value="passenger"]');
      const cargoRadio = document.querySelector('input[name="operationType"][value="cargo"]');
      const passengerSection = document.getElementById('passengerSection');
      const cargoSection = document.getElementById('cargoSection');
      const locationSelect = document.getElementById('location');
      const gateSection = document.getElementById('gateSection');
      const gateFlightType = document.getElementById('gateFlightType');
      const remoteQuickCheck = document.getElementById('remoteQuickSelectCheck');
      terminalSelect.innerHTML = '<option value="">-- Выберите терминал --</option>';
      
      if (this.value) {
        const airport = standsData.airports[this.value];
        Object.keys(airport.terminals).forEach(key => {
          const terminal = airport.terminals[key];
          const option = document.createElement('option');
          option.value = key;
          option.textContent = terminal.name;
          terminalSelect.appendChild(option);
        });
      }

      // По умолчанию опции типа операции и Lowcost/Charter недоступны
      if (passengerRadio) {
        passengerRadio.checked = true;
      }
      if (cargoRadio) {
        cargoRadio.checked = false;
      }
      operationRadios.forEach(radio => {
        radio.disabled = true;
      });
      passengerSection.classList.remove('disabled');
      cargoSection.classList.add('disabled');
      locationSelect.value = '';
      locationSelect.disabled = false;
      gateSection.classList.add('disabled');
      gateFlightType.disabled = true;
      gateFlightType.value = '';
      remoteQuickCheck.checked = false;
      remoteQuickCheck.disabled = true;

      // Сбрасываем тип самолета к полному списку
      const aircraftSelect = document.getElementById('aircraftType');
      aircraftSelect.innerHTML = '<option value="">-- Не выбрано --</option>';
      aircraftTypes.forEach(type => {
        const option = document.createElement('option');
        option.value = type.code;
        option.textContent = type.name;
        aircraftSelect.appendChild(option);
      });
    });

    // Обработчик смены терминала
    document.getElementById('terminal').addEventListener('change', function() {
      const airport = document.getElementById('airport').value;
      const locationSelect = document.getElementById('location');
      const gateSection = document.getElementById('gateSection');
      const gateFlightType = document.getElementById('gateFlightType');
      const remoteQuickCheck = document.getElementById('remoteQuickSelectCheck');
      const operationRadios = document.querySelectorAll('input[name="operationType"]');
      const passengerRadio = document.querySelector('input[name="operationType"][value="passenger"]');
      const cargoRadio = document.querySelector('input[name="operationType"][value="cargo"]');
      const passengerSection = document.getElementById('passengerSection');
      const cargoSection = document.getElementById('cargoSection');
      const aircraftSelect = document.getElementById('aircraftType');
      const isVnukovo1 = airport === 'UUWW' && this.value === 'terminal1';

      if (isVnukovo1) {
        operationRadios.forEach(radio => {
          radio.disabled = false;
        });
        if (cargoRadio && cargoRadio.checked) {
          passengerSection.classList.add('disabled');
          cargoSection.classList.remove('disabled');
          locationSelect.disabled = true;
        } else {
          passengerSection.classList.remove('disabled');
          cargoSection.classList.add('disabled');
          locationSelect.disabled = false;
        }
        locationSelect.value = '';
        gateSection.classList.add('disabled');
        gateFlightType.disabled = true;
        gateFlightType.value = '';
        remoteQuickCheck.checked = false;
        remoteQuickCheck.disabled = false;
      } else {
        if (passengerRadio) {
          passengerRadio.checked = true;
        }
        operationRadios.forEach(radio => {
          radio.disabled = true;
        });
        passengerSection.classList.remove('disabled');
        cargoSection.classList.add('disabled');
        locationSelect.disabled = false;
        locationSelect.value = '';
        gateSection.classList.add('disabled');
        gateFlightType.disabled = true;
        gateFlightType.value = '';
        remoteQuickCheck.checked = false;
        remoteQuickCheck.disabled = false;
      }

      // Обновляем список типов самолетов в зависимости от терминала
      aircraftSelect.innerHTML = '<option value="">-- Не выбрано --</option>';
      if (this.value && airport) {
        const airportData = standsData.airports[airport];
        const terminalData = airportData.terminals[this.value];
        aircraftTypes.forEach(type => {
          if (terminalData[type.code] && terminalData[type.code].length > 0) {
            const option = document.createElement('option');
            option.value = type.code;
            option.textContent = type.name;
            aircraftSelect.appendChild(option);
          }
        });
      } else {
        // Если терминал не выбран, показываем все типы
        aircraftTypes.forEach(type => {
          const option = document.createElement('option');
          option.value = type.code;
          option.textContent = type.name;
          aircraftSelect.appendChild(option);
        });
      }
    });

    // Заполняем типы самолетов
    const aircraftSelect = document.getElementById('aircraftType');
    aircraftTypes.forEach(type => {
      const option = document.createElement('option');
      option.value = type.code;
      option.textContent = type.name;
      aircraftSelect.appendChild(option);
    });

    // Обработчик смены типа операции
    document.querySelectorAll('input[name="operationType"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const passengerSection = document.getElementById('passengerSection');
        const cargoSection = document.getElementById('cargoSection');
        const locationSelect = document.getElementById('location');
        const remoteQuickCheck = document.getElementById('remoteQuickSelectCheck');
        const airport = document.getElementById('airport').value;
        const terminal = document.getElementById('terminal').value;
        const isVnukovo1 = airport === 'UUWW' && terminal === 'terminal1';

        if (this.value === 'passenger') {
          passengerSection.classList.remove('disabled');
          cargoSection.classList.add('disabled');
          locationSelect.disabled = false;
          remoteQuickCheck.disabled = !isVnukovo1;
        } else {
          passengerSection.classList.add('disabled');
          cargoSection.classList.remove('disabled');
          locationSelect.disabled = true;
          locationSelect.value = '';
          remoteQuickCheck.disabled = true;
          remoteQuickCheck.checked = false;
        }
      });
    });

    // Обработчик выбора расположения
    document.getElementById('location').addEventListener('change', function() {
      const gateSection = document.getElementById('gateSection');
      const gateFlightType = document.getElementById('gateFlightType');
      const remoteQuickCheck = document.getElementById('remoteQuickSelectCheck');
      const airport = document.getElementById('airport').value;
      const terminal = document.getElementById('terminal').value;
      const isVnukovo1 = airport === 'UUWW' && terminal === 'terminal1';

      if (this.value === 'gate') {
        gateSection.classList.remove('disabled');
        gateFlightType.disabled = false;
        remoteQuickCheck.checked = false;
        remoteQuickCheck.disabled = true;
      } else if (this.value === 'remote') {
        gateSection.classList.add('disabled');
        gateFlightType.disabled = true;
        gateFlightType.value = '';
        remoteQuickCheck.disabled = !isVnukovo1;
      } else {
        gateSection.classList.add('disabled');
        gateFlightType.disabled = true;
        gateFlightType.value = '';
        remoteQuickCheck.checked = false;
        remoteQuickCheck.disabled = !isVnukovo1;
      }
    });

    // Обработчик checkbox "Lowcost/Charter"
    document.getElementById('remoteQuickSelectCheck').addEventListener('change', function() {
      const locationSelect = document.getElementById('location');
      
      if (this.checked) {
        locationSelect.value = 'remote';
        locationSelect.disabled = true;
      } else {
        locationSelect.value = '';
        locationSelect.disabled = false;
      }
    });

    function loadNotamStands() {
      const input = document.getElementById('notamStands').value;
      const statusDiv = document.getElementById('notamStatus');

      if (!input.trim()) {
        statusDiv.innerHTML = '<p style="color: #ff9800;">⚠️ Введите номера стоянок</p>';
        return;
      }

      // Парсим введенные стоянки (убираем пробелы)
      const notamStands = input.split(',').map(s => s.trim()).filter(s => s);

      // Обновляем closed_notam во всех терминалах
      Object.keys(standsData.airports).forEach(airportCode => {
        const airport = standsData.airports[airportCode];
        Object.keys(airport.terminals).forEach(terminalCode => {
          airport.terminals[terminalCode].closed_notam = notamStands;
        });
      });

      statusDiv.innerHTML = `<p style="color: #4caf50;">✓ Загружено ${notamStands.length} стоянок: ${notamStands.join(', ')}</p>`;
    }

    function getIntersection(...arrays) {
      if (arrays.length === 0) return [];
      
      const nonEmptyArrays = arrays.filter(arr => arr && arr.length > 0);
      
      if (nonEmptyArrays.length === 0) return [];
      
      return nonEmptyArrays[0].filter(item =>
        nonEmptyArrays.every(arr => arr.includes(item))
      );
    }

    function find() {
      const airport = document.getElementById('airport').value;
      const terminal = document.getElementById('terminal').value;
      const operationType = document.querySelector('input[name="operationType"]:checked').value;
      const location = operationType === 'passenger' ? document.getElementById('location').value : null;
      const gateFlightType = location === 'gate' ? document.getElementById('gateFlightType').value : null;
      const aircraftType = document.getElementById('aircraftType').value;
      const remoteQuickSelectChecked = document.getElementById('remoteQuickSelectCheck').checked;
      const resultDiv = document.getElementById('result');

      // Проверяем, что выбран аэропорт и терминал
      if (!airport || !terminal) {
        resultDiv.innerHTML = '<p style="color: #ff9800;">⚠️ Выберите аэропорт и терминал</p>';
        return;
      }

      // Проверяем, что выбран хотя бы один критерий
      if (operationType === 'passenger' && !location && !aircraftType) {
        resultDiv.innerHTML = '<p style="color: #ff9800;">⚠️ Выберите расположение или тип самолета</p>';
        return;
      }

      const terminalData = standsData.airports[airport].terminals[terminal];
      const closedStands = terminalData.closed || [];
      const closedNotamStands = terminalData.closed_notam || [];
      const allClosedStands = [...new Set([...closedStands, ...closedNotamStands])];
      const arraysToIntersect = [];
      
      if (operationType === 'passenger') {
        if (location === 'gate') {
          if (gateFlightType) {
            arraysToIntersect.push((terminalData.passenger && terminalData.passenger.gate && terminalData.passenger.gate[gateFlightType]) || []);
          }
        } else if (location === 'remote') {
          arraysToIntersect.push((terminalData.passenger && terminalData.passenger.remote) || []);
        }
      } else {
        // Cargo
        arraysToIntersect.push(terminalData.cargo || []);
      }

      if (aircraftType && terminalData[aircraftType] && terminalData[aircraftType].length > 0) {
        arraysToIntersect.push(terminalData[aircraftType]);
      }

      const result = getIntersection(...arraysToIntersect);

      if (result.length === 0) {
        resultDiv.innerHTML = '<p style="color: #d32f2f;">❌ Нет доступных стоек для выбранных критериев</p>';
      } else {
        // Разделяем стоянки на активные и закрытые
        const activeStands = result.filter(stand => !allClosedStands.includes(stand));
        const closedResultStands = result.filter(stand => allClosedStands.includes(stand));

        let html = '<p><strong>Доступные места стоянки:</strong></p><div>';
        
        // Выводим активные стоянки зеленым
        activeStands.forEach(stand => {
          html += `<span class="stand-item stand-active">${stand}</span>`;
        });

        // Выводим закрытые стоянки красным и зачеркнутыми
        closedResultStands.forEach(stand => {
          html += `<span class="stand-item stand-closed">${stand}</span>`;
        });

        html += '</div>';
        resultDiv.innerHTML = html;
      }
    }
  </script>
</body>
</html>
